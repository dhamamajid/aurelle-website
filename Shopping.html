<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurelle</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&display=swap" rel="stylesheet">
    <link hreft="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="stylesheet.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="logo.png" type="image/png">
</head>
<body class="page-shop">
    <div class="wrapper">
        <div class="top-bar">
            <div class="logo-area">
                <a href="index.html">
                <img src="logo.png" alt="Aurelle Logo" class="logo-image">
                <span>Aurelle</span>
                </a>
            </div>
            <div class="nav-links">
                <a href="Shopping.html">Shop</a>
                <a href="About_us.html">About us</a>
                <a href="contact_us.html">Contact us</a>
                <a href="admin.html">Admin</a>
            </div>
            <div class="account-cart-search">
                <img src="search icon.png" alt="search" class="icon">
                            <a href="cart.html" class="cart-link"><img src="cart icon.png" alt="Cart" class="icon"><span class="cart-count" id="cart-count">0</span></a>   
              <a href="Account.html"><img src="account icon.png" alt="Account" class="icon"></a>
            </div>
        </div>
<!-- Here we put the product for shopping --> 
        <div class="products-container" id="products-container"></div>

    <footer>
        <!-- footer: terms and conditions, policies, social media icons -->
        <div class="Term-Policy">
            <a href="Terms-and-conditions.html">Terms and Conditions</a>
            <a href="Policies.html">Policies</a>
        </div>
        <div class="social-media">
            <a href="https://www.instagram.com/aurelle.perfume/"><img src="instagram logo.png" alt="Instagram" class="icon"></a>
            <a href="#"><img src="tiktok icon.png" alt="TikTok" class="icon"></a>
        </div>
    </footer>
    <script>
        const STORAGE_KEYS = {
            products: 'aurelleProducts'
        };

        function updateCartCount() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cart-count').textContent = totalItems;
        }

        function seedProductsIfNeeded() {
            const defaults = [
                {
                    id: 'product1',
                    name: 'Everlasting Vanilla',
                    image: 'Product1.png',
                    pageLink: 'Product1.html',
                    visible: true,
                    prices: { '30': 30, '50': 50, '100': 100 },
                    notes: {
                        top: 'Bergamot, Orange flower',
                        heart: 'Aurantiol, Rose, Oakwood, Geranium',
                        base: 'Vanilla, Amber, Sandalwood, Coconut',
                        description: 'A soft, luminous fragrance that unfolds like a warm memory on the skin.'
                    }
                },
                {
                    id: 'product2',
                    name: 'Product 2',
                    image: 'Product2.png',
                    pageLink: 'Product2.html',
                    visible: true,
                    prices: { '30': 30, '50': 50, '100': 100 },
                    notes: { top: '...', heart: '...', base: '...', description: 'Product description.' }
                },
                {
                    id: 'product3',
                    name: 'Product 3',
                    image: 'Product3.png',
                    pageLink: 'Product3.html',
                    visible: true,
                    prices: { '30': 30, '50': 50, '100': 100 },
                    notes: { top: '...', heart: '...', base: '...', description: 'Product description.' }
                }
            ];

            const current = JSON.parse(localStorage.getItem(STORAGE_KEYS.products) || '[]');

            if (!current.length) {
                localStorage.setItem(STORAGE_KEYS.products, JSON.stringify(defaults));
                return;
            }

            const existingIds = new Set(current.map((item) => item.id));
            const missingDefaults = defaults.filter((item) => !existingIds.has(item.id));

            if (missingDefaults.length) {
                localStorage.setItem(STORAGE_KEYS.products, JSON.stringify([...current, ...missingDefaults]));
            }
        }

        function renderProducts() {
            const productsContainer = document.getElementById('products-container');
            const products = JSON.parse(localStorage.getItem(STORAGE_KEYS.products) || '[]').filter((p) => p.visible !== false);

            if (!products.length) {
                productsContainer.innerHTML = '<p class="cart-empty-msg">No products available right now.</p>';
                return;
            }

            productsContainer.innerHTML = products.map((product) => {
                const targetLink = product.pageLink && product.pageLink.trim() ? product.pageLink : ('Product.html?id=' + encodeURIComponent(product.id));
                return `
                    <div class="product-card">
                        <img src="${product.image}" alt="${product.name}" class="product-image">
                        <a href="${targetLink}"><button class="product-button">${product.name}</button></a>
                    </div>
                `;
            }).join('');
        }

        seedProductsIfNeeded();
        updateCartCount();
        renderProducts();
    </script>
    <script src="auth-nav.js"></script>
</body>
</html>
