<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurelle</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&display=swap" rel="stylesheet">
    <link hreft="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="stylesheet.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="logo.png" type="image/png">
</head>
<body class="page-checkout">
    <div class="wrapper">
        <div class="top-bar">
            <div class="logo-area">
               <a href="index.html">
                <img src="logo.png" alt="Aurelle Logo" class="logo-image">
                <span>Aurelle</span>
                </a>
            </div>
            <div class="nav-links">
                <a href="Shopping.html">Shop</a>
                <a href="About_us.html">About us</a>
                <a href="contact_us.html">Contact us</a>
                <a href="admin.html">Admin</a>
            </div>
            <div class="account-cart-search">
                <img src="search icon.png" alt="search" class="icon">
                            <a href="cart.html" class="cart-link"><img src="cart icon.png" alt="Cart" class="icon"><span class="cart-count" id="cart-count">0</span></a>                
              <a href="Account.html"><img src="account icon.png" alt="Account" class="icon"></a>
            </div>
        </div>
        <!-- checkout info block -->
        <div class="main-content">
            <img src="Cart-order-step2.png" alt="Order Steps" class="order-steps-image">

            <div class="checkout-content">
                <h2 class="checkout-title">Delivery Information</h2>
                <form id="checkout-form" novalidate>
                    <div class="checkout-row">
                        <div class="checkout-field">
                            <label for="first-name">First Name</label>
                            <input type="text" id="first-name" name="first-name" placeholder="First name" required autocomplete="given-name">
                        </div>
                        <div class="checkout-field">
                            <label for="last-name">Last Name</label>
                            <input type="text" id="last-name" name="last-name" placeholder="Last name" required autocomplete="family-name">
                        </div>
                    </div>
                    <div class="checkout-field">
                        <label for="checkout-email">Email Address</label>
                        <input type="email" id="checkout-email" name="email" placeholder="your@email.com" required autocomplete="email">
                    </div>
                    <div class="checkout-field">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" name="phone" placeholder="+32 ..." required autocomplete="tel">
                    </div>
                    <div class="checkout-field">
                        <label for="address">Street Address</label>
                        <input type="text" id="address" name="address" placeholder="Street and house number" required autocomplete="street-address">
                    </div>
                    <div class="checkout-row">
                        <div class="checkout-field">
                            <label for="city">City</label>
                            <input type="text" id="city" name="city" placeholder="City" required autocomplete="address-level2">
                        </div>
                        <div class="checkout-field">
                            <label for="postal">Postal Code</label>
                            <input type="text" id="postal" name="postal" placeholder="0000" required autocomplete="postal-code">
                        </div>
                    </div>
                    <div class="checkout-field">
                        <label for="country">Country</label>
                        <input type="text" id="country" name="country" placeholder="Country" required autocomplete="country-name">
                    </div>
                    <div class="checkout-field">
                        <label for="order-notes">Order Notes <span class="optional">(optional)</span></label>
                        <textarea id="order-notes" name="order-notes" placeholder="Any special instructions for your order..." rows="3"></textarea>
                    </div>
                    <div class="cart-actions">
                        <button type="submit" class="product-button">Place Order</button>
                        <a href="cart.html" class="product-button cart-action-link">Back to Cart</a>
                    </div>
                </form>
            </div>














            </div>
        </div>
    <footer>
        <!-- footer: terms and conditions, policies, social media icons -->
        <div class="Term-Policy">
            <a href="Terms-and-conditions.html">Terms and Conditions</a>
            <a href="Policies.html">Policies</a>
        </div>
        <div class="social-media">
            <a href="https://www.instagram.com/aurelle.perfume/"><img src="instagram logo.png" alt="Instagram" class="icon"></a>
            <a href="#"><img src="tiktok icon.png" alt="TikTok" class="icon"></a>
        </div>
    </footer>
<script>
    function updateCartCount() {
        const cart = JSON.parse(localStorage.getItem('cart')) || [];
        const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
        document.getElementById('cart-count').textContent = totalItems;
    }
    updateCartCount();

    document.getElementById('checkout-form').addEventListener('submit', function(e) {
        e.preventDefault();
        try {
            const fields = [
                'first-name', 'last-name', 'checkout-email',
                'phone', 'address', 'city', 'postal', 'country'
            ];
            let valid = true;
            fields.forEach(function(id) {
                const el = document.getElementById(id);
                if (!el || !el.value.trim()) {
                    if (el) el.style.borderColor = '#f00';
                    valid = false;
                } else {
                    el.style.borderColor = '#000';
                }
            });

            if (!valid) return;

            const deliveryInfo = {
                firstName: document.getElementById('first-name').value.trim(),
                lastName:  document.getElementById('last-name').value.trim(),
                email:     document.getElementById('checkout-email').value.trim(),
                phone:     document.getElementById('phone').value.trim(),
                address:   document.getElementById('address').value.trim(),
                city:      document.getElementById('city').value.trim(),
                postal:    document.getElementById('postal').value.trim(),
                country:   document.getElementById('country').value.trim(),
                notes:     document.getElementById('order-notes').value.trim()
            };
            sessionStorage.setItem('deliveryInfo', JSON.stringify(deliveryInfo));
            window.location.href = 'order_summary.html';
        } catch(err) {
            alert('Something went wrong: ' + err.message);
        }
    });
</script>
    <script src="auth-nav.js"></script>
</body>
</html>
