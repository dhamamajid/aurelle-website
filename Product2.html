    <script>
        // Zoom functionality
        const zoomWrapper = document.getElementById('zoomWrapper');
        const productImage = document.getElementById('productImage');
        
        zoomWrapper.addEventListener('mousemove', function(e) {
            const rect = zoomWrapper.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            // Move the image based on mouse position for pan effect
            const xPercent = (x / rect.width) * 100;
            const yPercent = (y / rect.height) * 100;
            
            productImage.style.transformOrigin = xPercent + '% ' + yPercent + '%';
            productImage.style.transform = 'scale(1.5)';
        });
        
        zoomWrapper.addEventListener('mouseleave', function() {
            productImage.style.transform = 'scale(1)';
            productImage.style.transformOrigin = 'center center';
        });

        // Dynamic pricing based on volume
        const volumeSelect = document.getElementById('volume');
        const productPrice = document.getElementById('productPrice');
        
        // Price mapping for volumes
        const volumePrices = {
            '30': '$30.00',
            '50': '$50.00',
            '100': '$100.00'
        };
        
        // Update price when volume changes
        volumeSelect.addEventListener('change', function() {
            const selectedVolume = this.value;
            productPrice.textContent = volumePrices[selectedVolume];
        });
// Add to cart functionality
document.querySelector('.add-to-cart-button').addEventListener('click', function() {

    const product = {
        id: "product2", // important for identifying same product
        name: "Product 2",
        price: parseFloat(document.getElementById('productPrice').textContent.replace('$','')),
        volume: document.getElementById('volume').value + " mL",
        image: document.getElementById('productImage').src,
        quantity: 1
    };

    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    // Check if product already exists (same id + volume)
    const existingProduct = cart.find(item => item.id === product.id && item.volume === product.volume);

    if (existingProduct) {
        existingProduct.quantity += 1;
    } else {
        cart.push(product);
    }

    localStorage.setItem("cart", JSON.stringify(cart));

    // Update cart count instead of redirecting
    updateCartCount();
});

// Function to update cart count display
function updateCartCount() {
    const cart = JSON.parse(localStorage.getItem("cart")) || [];
    let totalItems = 0;
    
    cart.forEach(item => {
        totalItems += item.quantity;
    });
    
    document.getElementById('cart-count').textContent = totalItems;
}

// Initialize cart count on page load
updateCartCount();

    <script>
    // Reviews script for Product2
   function(){
        const storageKey = 'reviews_product2';
        const reviewsList = document.getElementById('reviewsList');
        const form = document.getElementById('reviewForm');

        function loadReviews(){
            try{ return JSON.parse(localStorage.getItem(storageKey)) || []; }catch(e){return []}
        }
        function saveReviews(reviews){ localStorage.setItem(storageKey, JSON.stringify(reviews)); }
        function render(){
            const reviews = loadReviews();
            if(!reviews.length){ reviewsList.innerHTML = '<p>No reviews yet. Be the first to review!</p>'; return; }
            reviewsList.innerHTML = reviews.map(r=>`<div class="review-card"><div class="review-meta"><strong>${r.name}</strong> — ${r.rating}★ — <em>${new Date(r.date).toLocaleDateString()}</em></div><div class="review-text">${r.text}</div></div>`).join('');
        }
        if(form){ form.addEventListener('submit', function(e){ e.preventDefault(); const name=document.getElementById('reviewerName').value.trim(); const rating=document.getElementById('reviewRating').value; const text=document.getElementById('reviewText').value.trim(); if(!name||!text) return; const reviews=loadReviews(); reviews.unshift({name,rating,text,date:Date.now()}); saveReviews(reviews); render(); form.reset(); }); }
        render();
    })();
    </script>
