    <script>
        const USERS_KEY = 'aurelleUsers';
        const SESSION_KEY = 'aurelleAuthSession';
        const API_BASE = 'http://localhost:3000/api/v1';

        function parseJson(value, fallback) {
            try {
                return JSON.parse(value);
            } catch (err) {
                return fallback;
            }
        }

        function getUsers() {
            return parseJson(localStorage.getItem(USERS_KEY), []);
        }

        function saveUsers(users) {
            localStorage.setItem(USERS_KEY, JSON.stringify(users));
        }

        function fallbackHash(input) {
            let hash = 5381;
            const text = String(input || '');
            for (let i = 0; i < text.length; i += 1) {
                hash = ((hash << 5) + hash) + text.charCodeAt(i);
                hash |= 0;
            }
            return 'fallback-' + (hash >>> 0).toString(16);
        }

        async function sha256(input) {
            try {
                if (!window.crypto || !window.crypto.subtle) {
                    return fallbackHash(input);
                }
                const encoder = new TextEncoder();
                const data = encoder.encode(input);
                const digest = await crypto.subtle.digest('SHA-256', data);
                return Array.from(new Uint8Array(digest)).map((b) => b.toString(16).padStart(2, '0')).join('');
            } catch (err) {
                return fallbackHash(input);
            }
        }

        async function syncUserToBackend(user) {
            try {
                await fetch(API_BASE + '/users', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: user.name,
                        email: user.email,
                        passwordHash: user.passwordHash,
                        phone: user.phone || '',
                        city: user.city || '',
                        country: user.country || ''
                    })
                });
            } catch (err) {
                // Local account still works if backend is offline.
            }
        }

        function updateCartCount() {
            const cart = parseJson(localStorage.getItem('cart'), []);
            const totalItems = cart.reduce((sum, item) => sum + (item.quantity || 0), 0);
            document.getElementById('cart-count').textContent = totalItems;
        }

        updateCartCount();
    </script>
 <script>
        (function() {
            const toggleBtn = document.getElementById('password-toggle');
            const passwordField = document.getElementById('password');
            const toggleIcon = document.getElementById('password-toggle-icon');

            if (toggleBtn && passwordField && toggleIcon) {
                // Function to toggle visibility and update icon
                const togglePassword = () => {
                    const isPassword = passwordField.type === 'password';
                    passwordField.type = isPassword ? 'text' : 'password';
                    // Switch icon: open-eye (hidden) → closed-eye (visible)
                    toggleIcon.src = isPassword ? 'closed-eye.png' : 'open-eye.png';
                    toggleIcon.alt = isPassword ? 'Hide password' : 'Show password';
                    // Keep focus inside the input after toggle
                    passwordField.focus();
                };

                // Click event for the eye button
                toggleBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    togglePassword();
                });

                // Optional: allow keyboard activation (Enter / Space)
                toggleBtn.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        togglePassword();
                    }
                });

                // Ensure initial state is consistent
                if (passwordField.type !== 'password') {
                    passwordField.type = 'password';
                    toggleIcon.src = 'open-eye.png';
                    toggleIcon.alt = 'Show password';
                }
            }

            // Optional: simple client-side validation (matches your style)
            const form = document.getElementById('register-form');
            const submitBtn = form ? form.querySelector('button[type="submit"]') : null;
            const passwordEl = document.getElementById('password');
            const confirmPasswordEl = document.getElementById('confirm-password');

            const updateSubmitState = () => {
                if (!submitBtn || !passwordEl || !confirmPasswordEl) return;
                const match = passwordEl.value && passwordEl.value === confirmPasswordEl.value;
                submitBtn.disabled = !match;
                confirmPasswordEl.style.borderColor = match || !confirmPasswordEl.value ? '#000' : '#f00';
            };

            if (passwordEl && confirmPasswordEl) {
                passwordEl.addEventListener('input', updateSubmitState);
                confirmPasswordEl.addEventListener('input', updateSubmitState);
                updateSubmitState();
            }

            if (form) {
                form.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const email = document.getElementById('email');
                    const confirmEmail = document.getElementById('confirm-email');
                    const nameEl = document.getElementById('Name');
                    const pwd = document.getElementById('password');
                    if (!nameEl.value.trim()) {
                        alert('Please enter your name.');
                        nameEl.focus();
                        return;
                    }

                    if (!email.value.trim()) {
                        alert('Please enter your e-mail address.');
                        email.focus();
                        return;
                    }

                    if (email.value.trim().toLowerCase() !== confirmEmail.value.trim().toLowerCase()) {
                        alert('Email and confirm email must match.');
                        confirmEmail.focus();
                        return;
                    }

                    if (!pwd.value) {
                        alert('Please enter your password.');
                        pwd.focus();
                        return;
                    }

                    if (pwd.value !== confirmPasswordEl.value) {
                        alert('Passwords do not match. Please confirm exactly.');
                        confirmPasswordEl.focus();
                        return;
                    }

                    const normalizedEmail = email.value.trim().toLowerCase();
                    const users = getUsers();
                    if (users.some((u) => String(u.email || '').toLowerCase() === normalizedEmail)) {
                        alert('An account with this email already exists. Please log in.');
                        window.location.href = 'Account.html';
                        return;
                    }

                    const user = {
                        id: 'u-' + Date.now(),
                        name: nameEl.value.trim(),
                        email: normalizedEmail,
                        passwordHash: await sha256(pwd.value),
                        dateCreated: new Date().toISOString()
                    };

                    users.push(user);
                    saveUsers(users);
                    localStorage.setItem(SESSION_KEY, JSON.stringify({
                        email: user.email,
                        name: user.name,
                        loggedInAt: new Date().toISOString()
                    }));

                    // Do not block registration flow on backend availability.
                    syncUserToBackend(user);
                    alert('Registration successful. Redirecting to your account.');
                    window.location.href = 'Account.html';
                });
            }
        })();

        (function() {
            const toggleBtn = document.getElementById('confirm-password-toggle');
            const passwordField = document.getElementById('confirm-password');
            const toggleIcon = document.getElementById('confirm-password-toggle-icon');

            if (toggleBtn && passwordField && toggleIcon) {
                // Function to toggle visibility and update icon
                const togglePassword = () => {
                    const isPassword = passwordField.type === 'password';
                    passwordField.type = isPassword ? 'text' : 'password';
                    // Switch icon: open-eye (hidden) → closed-eye (visible)
                    toggleIcon.src = isPassword ? 'closed-eye.png' : 'open-eye.png';
                    toggleIcon.alt = isPassword ? 'Hide password' : 'Show password';
                    // Keep focus inside the input after toggle
                    passwordField.focus();
                };

                // Click event for the eye button
                toggleBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    togglePassword();
                });

                // Optional: allow keyboard activation (Enter / Space)
                toggleBtn.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        togglePassword();
                    }
                });

                // Ensure initial state is consistent
                if (passwordField.type !== 'password') {
                    passwordField.type = 'password';
                    toggleIcon.src = 'open-eye.png';
                    toggleIcon.alt = 'Show password';
                }
            }
        })();
    </script>
