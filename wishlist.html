<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurelle - Wishlist</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="stylesheet.css">
    <link rel="icon" href="logo.png" type="image/png">
</head>
<body class="page-wishlist">
    <div class="wrapper">
        <div class="top-bar">
            <div class="logo-area">
                <a href="index.html">
                    <img src="logo.png" alt="Aurelle Logo" class="logo-image">
                    <span>Aurelle</span>
                </a>
            </div>
            <div class="nav-links">
                <a href="Shopping.html">Shop</a>
                <a href="About_us.html">About us</a>
                <a href="contact_us.html">Contact us</a>
                <a href="admin.html">Admin</a>
            </div>
            <div class="account-cart-search">
                <a href="wishlist.html"><img src="wishlist.jpg" alt="Wishlist" class="icon"></a>
                <a href="cart.html" class="cart-link"><img src="cart icon.png" alt="Cart" class="icon"><span id="cart-count" class="cart-count">0</span></a>
                <a href="Account.html"><img src="account icon.png" alt="Account" class="icon"></a>
            </div>
        </div>

        <div class="main-content">
            <h2 class="cart-title">My Wishlist</h2>
            <div id="wishlist-container"></div>
            <div class="cart-actions" style="position: static; margin-top: 20px;">
                <a href="Shopping.html" class="product-button cart-action-link">Back to Shop</a>
            </div>
        </div>
    </div>

    <footer>
        <div class="Term-Policy">
            <a href="Terms-and-conditions.html">Terms and Conditions</a>
            <a href="Policies.html">Policies</a>
        </div>
        <div class="social-media">
            <a href="https://www.instagram.com/aurelle.perfume/"><img src="instagram logo.png" alt="Instagram" class="icon"></a>
            <a href="#"><img src="tiktok icon.png" alt="TikTok" class="icon"></a>
        </div>
    </footer>

    <script>
        const AUTH_SESSION_KEY = 'aurelleAuthSession';
        const WISHLIST_KEY = 'aurelleWishlist';

        function parseJson(value, fallback) {
            try {
                return JSON.parse(value);
            } catch (err) {
                return fallback;
            }
        }

        function updateCartCount() {
            const cart = parseJson(localStorage.getItem('cart'), []);
            const totalItems = cart.reduce((sum, item) => sum + (item.quantity || 0), 0);
            document.getElementById('cart-count').textContent = totalItems;
        }

        function isLoggedIn() {
            const session = parseJson(localStorage.getItem(AUTH_SESSION_KEY), null);
            return !!(session && session.email);
        }

        function renderWishlist() {
            const container = document.getElementById('wishlist-container');
            const wishlist = parseJson(localStorage.getItem(WISHLIST_KEY), []);

            if (!wishlist.length) {
                container.innerHTML = '<p class="cart-empty-msg">Your wishlist is empty.</p>';
                return;
            }

            container.innerHTML = wishlist.map((item, index) => `
                <div class="cart-item">
                    <img src="${item.image}" alt="${item.name}" class="cart-item-image">
                    <div class="cart-item-details">
                        <h3 class="cart-item-name">${item.name}</h3>
                        <p class="cart-item-meta">${item.volume || 'Volume not selected'}</p>
                        <p class="cart-item-meta">Price: €${Number(item.price || 0).toFixed(2)}</p>
                        <div class="admin-tools-row">
                            <a href="${item.link || 'Shopping.html'}" class="product-button cart-action-link">View Product</a>
                            <button class="product-button cart-item-remove" onclick="removeWishlistItem(${index})">Remove</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function removeWishlistItem(index) {
            const wishlist = parseJson(localStorage.getItem(WISHLIST_KEY), []);
            wishlist.splice(index, 1);
            localStorage.setItem(WISHLIST_KEY, JSON.stringify(wishlist));
            renderWishlist();
        }

        if (!isLoggedIn()) {
            window.location.href = 'Account.html';
        } else {
            updateCartCount();
            renderWishlist();
            window.removeWishlistItem = removeWishlistItem;
        }
    </script>
    <script src="auth-nav.js"></script>
</body>
</html>
