<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurelle</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&display=swap" rel="stylesheet">
    <link hreft="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="stylesheet.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="logo.png" type="image/png">
</head>
<body>
    <div class="wrapper">
        <div class="top-bar">
            <div class="logo-area">
               <a href="index.html">
                <img src="logo.png" alt="Aurelle Logo" class="logo-image">
                <span>Aurelle</span>
                </a>
            </div>
            <div class="nav-links">
                <a href="Shopping.html">Shop</a>
                <a href="About_us.html">About us</a>
                <a href="contact_us.html">Contact us</a>
            </div>
            <div class="account-cart-search">
                <img src="search icon.png" alt="search" class="icon">
                <a href="cart.html" class="cart-link"><img src="cart icon.png" alt="Cart" class="icon"><span id="cart-count" class="cart-count">0</span></a>                
              <a href="Account.html"><img src="account icon.png" alt="Account" class="icon"></a>
            </div>
        </div>
    </div>
    <div class="contact-content">
        <h2 class="contact-title">Contact Us</h2>
        <p class="contact-info">If you have any questions or feedback, please feel free to reach out to us. We are here to assist you and provide the best possible experience.</p>
        <ul class="contact-details">
            <li>Email: <a href="mailto:info@aurelle.perfumery.com">info@aurelle.perfumery.com</a></li>
        </ul>
         <main class="container">

            <form id="contact-form">
            
            <!-- Contact Information Box -->
            <input 
                type="text" 
                id="contact-info" 
                placeholder="Contact information"
                required
            >

            <!-- Message Box -->
            <textarea 
                id="message" 
                placeholder="Write us...."
                required
            ></textarea>

            <button type="submit">Submit</button>
            </form>
        </main>
    </div>
    <footer>
        <!-- footer: terms and conditions, policies, social media icons -->
        <div class="Term-Policy">
            <a href="Terms-and-conditions.html">Terms and Conditions</a>
            <a href="Policies.html">Policies</a>
        </div>
        <div class="social-media">
            <a href="https://www.instagram.com/aurelle.perfume/"><img src="instagram logo.png" alt="Instagram" class="icon"></a>
            <a href="#"><img src="tiktok icon.png" alt="TikTok" class="icon"></a>
        </div>
    </footer>
    <script>
        // Function to update cart count display
        function updateCartCount() {
            const cart = JSON.parse(localStorage.getItem("cart")) || [];
            let totalItems = 0;
            
            cart.forEach(item => {
                totalItems += item.quantity;
            });
            
            document.getElementById('cart-count').textContent = totalItems;
        }

        // Initialize cart count on page load
        updateCartCount();
    </script>
</body>
</html>
